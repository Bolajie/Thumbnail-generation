services:
  - type: web
    name: istv-thumbnail-engine
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node app/server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
